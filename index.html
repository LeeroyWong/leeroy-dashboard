<!DOCTYPE html>
<html lang="zh-CN"> 
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LeeroyCARE · 老板专属系统</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14120E;
    --panel: #1A1710;
    --panel-2: #1C1912;
    --border: #2A2619;
    --gold: #C9A15A;
    --gold-bright: #E8C77E;
    --text: #EDE6D8;
    --text-muted: #8C8672;
    --text-faint: #5A5540;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
  }
  .center-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 40px 32px;
  }
  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    color: var(--gold-bright);
    letter-spacing: 0.02em;
    margin-bottom: 4px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.08em;
    margin-bottom: 32px;
  }
  .field-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
  }
  input[type="email"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 16px;
  }
  input[type="email"]:focus { outline: none; border-color: var(--gold); }
  button {
    width: 100%;
    background: var(--gold);
    color: #14120E;
    border: none;
    padding: 12px 14px;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
  }
  button:hover { background: var(--gold-bright); }
  button:disabled { opacity: 0.5; cursor: default; }
  .msg { font-size: 13px; color: var(--text-muted); margin-top: 16px; line-height: 1.6; }
  .msg.success { color: #7FA86B; }
  .msg.error { color: #C97757; }

  .app-shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 220px;
    border-right: 1px solid var(--border);
    padding: 28px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
  }
  .main { flex: 1; padding: 40px 48px; max-width: 880px; }
  .nav-logout {
    margin-top: auto;
    font-size: 13px;
    color: var(--text-faint);
    cursor: pointer;
    padding: 8px 0;
  }
  .nav-logout:hover { color: var(--text); }

  h1.page-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .welcome-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 32px;
  }
  .formula-card {
    background: linear-gradient(155deg, var(--panel-2) 0%, #1A1710 100%);
    padding: 32px 36px;
  }
  .formula-tag {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 6px;
  }
  .formula-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px; color: var(--text); margin-bottom: 4px;
  }
  .formula-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 28px; }
  .pillar { display: flex; gap: 20px; padding: 20px 0; border-top: 1px solid #2A2619; }
  .pillar:first-child { border-top: none; }
  .pillar-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-faint); width: 28px; padding-top: 3px; }
  .pillar-name { font-family: 'Noto Serif SC', serif; font-size: 18px; color: var(--gold-bright); }
  .pillar-focus { font-size: 13px; color: #B5AE95; margin-left: 10px; }
  .pillar-detail { font-size: 14px; color: #9C9680; line-height: 1.7; margin-top: 6px; }

  .stage-row { display: flex; align-items: center; margin-bottom: 28px; }
  .stage-step { display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 68px; }
  .stage-dot { width: 20px; height: 20px; border-radius: 50%; }
  .stage-dot.done { background: var(--gold); }
  .stage-dot.current { background: var(--gold-bright); box-shadow: 0 0 0 4px rgba(232,199,126,0.2); }
  .stage-dot.upcoming { border: 2px solid #4A4636; }
  .stage-label { font-size: 12px; color: #C9C2A8; text-align: center; }
  .stage-label.upcoming { color: var(--text-faint); }
  .stage-line { flex: 1; height: 1px; background: #2A2619; margin-bottom: 22px; }
  .stage-line.active { background: #4A3F24; }

  .queue-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0; border-top: 1px solid #2A2619;
  }
  .queue-item:first-child { border-top: 1px solid #2A2619; }
  .queue-title { font-size: 14px; color: var(--text); }
  .queue-badge {
    font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--gold);
    background: rgba(201,161,90,0.1); padding: 3px 10px; border-radius: 20px;
  }
  .queue-eta { font-size: 13px; color: var(--text-muted); margin-left: 16px; }

  .metric-row { display: flex; gap: 40px; margin-bottom: 24px; flex-wrap: wrap; }
  .metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .metric-value { font-family: 'Noto Serif SC', serif; font-size: 28px; color: var(--text); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }

  /* ---------- Admin: shared form controls ---------- */
  .form-group { margin-bottom: 18px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  input[type="text"], input[type="number"], input[type="date"], select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
  }
  input[type="text"]:focus, input[type="number"]:focus, input[type="date"]:focus,
  select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  textarea { resize: vertical; min-height: 44px; line-height: 1.6; }

  .btn-row { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
  .btn-sm { width: auto; padding: 9px 18px; font-size: 13px; }
  .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
  .btn-secondary:hover { background: var(--panel-2); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid #6B3A2E; color: #C97757; }
  .btn-danger:hover { background: rgba(201,119,87,0.1); }
  .btn-ghost { width: auto; background: none; color: var(--gold); padding: 6px 0; text-decoration: none; }
  .btn-ghost:hover { color: var(--gold-bright); background: none; }

  /* ---------- Admin: topbar + client list ---------- */
  .admin-topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; }
  .search-input { max-width: 260px; }
  .client-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-top: 1px solid #2A2619; cursor: pointer;
  }
  .client-row:first-child { border-top: none; }
  .client-row:hover { background: var(--panel-2); }
  .client-name { font-size: 15px; color: var(--text); }
  .client-meta { font-size: 12px; color: var(--text-faint); margin-top: 2px; }
  .stage-chip {
    font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--gold);
    background: rgba(201,161,90,0.1); padding: 4px 10px; border-radius: 20px; white-space: nowrap;
  }

  /* ---------- Admin: editor ---------- */
  .editor-back { display: inline-block; margin-bottom: 20px; }
  .stage-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .stage-option {
    flex: 1; min-width: 100px; text-align: center; padding: 12px 8px;
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    font-size: 12px; color: var(--text-muted);
  }
  .stage-option.selected { border-color: var(--gold); color: var(--gold-bright); background: rgba(201,161,90,0.08); }

  .dyn-row { display: flex; gap: 10px; align-items: flex-start; padding: 12px 0; border-top: 1px solid #221F16; }
  .dyn-row:first-of-type { border-top: none; }
  .dyn-row input, .dyn-row select { flex: 1; }
  .dyn-row textarea { margin-top: 10px; }
  .dyn-row .remove-row-btn { flex: 0 0 auto; }
  .remove-row-btn {
    width: 32px; height: 32px; border-radius: 4px; border: 1px solid var(--border);
    background: transparent; color: var(--text-faint); font-size: 16px; line-height: 1;
    cursor: pointer; padding: 0;
  }
  .remove-row-btn:hover { color: #C97757; border-color: #6B3A2E; background: rgba(201,119,87,0.08); }
  .add-row-btn {
    width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--text-muted);
    padding: 10px; margin-top: 8px; font-size: 13px;
  }
  .add-row-btn:hover { border-color: var(--gold); color: var(--gold-bright); background: transparent; }
  .pillar-code-input { max-width: 60px; flex: 0 0 60px !important; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: 4px;
    font-size: 13px; background: var(--panel); border: 1px solid var(--border); color: var(--text);
    z-index: 100;
  }
  .toast.success { border-color: #3E5A34; color: #7FA86B; }
  .toast.error { border-color: #6B3A2E; color: #C97757; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================
// 配置区 —— 这两行已经帮你填好
// ============================================
const SUPABASE_URL = "https://ihsbhjvllssasdcuieyu.supabase.co";
const SUPABASE_KEY = "sb_publishable_cssDWjI1ikcWHqJjqgKt9g_2vEdbxh2";

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const app = document.getElementById("app");

// ---------- 阶段名称 ----------
const STAGE_NAMES = ["素材收集", "Editor 剪辑", "Leeroy 审核", "老板确认", "发布"];

// ---------- 小工具：右下角提示 ----------
function toast(message, isError = false) {
  const el = document.createElement("div");
  el.className = `toast ${isError ? 'error' : 'success'}`;
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ---------- 渲染：登入页 ----------
function renderLogin(message = "", isError = false) {
  app.innerHTML = `
    <div class="center-screen">
      <div class="login-box">
        <div class="logo">LEEROY WONG</div>
        <div class="logo-sub">内容陪跑系统 · 老板登入</div>
        <label class="field-label">邮箱地址</label>
        <input type="email" id="email-input" placeholder="you@example.com" />
        <button id="login-btn">发送登入连结</button>
        ${message ? `<div class="msg ${isError ? 'error' : 'success'}">${message}</div>` : ''}
      </div>
    </div>
  `;

  document.getElementById("login-btn").addEventListener("click", async () => {
    const email = document.getElementById("email-input").value.trim();
    if (!email) {
      renderLogin("请输入邮箱地址", true);
      return;
    }
    const btn = document.getElementById("login-btn");
    btn.disabled = true;
    btn.textContent = "发送中...";

    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href }
    });

    if (error) {
      renderLogin("发送失败：" + error.message, true);
    } else {
      renderLogin("登入连结已发送到你的邮箱，请check邮箱并点击连结登入。", false);
    }
  });
}

// ---------- 渲染：老板 Dashboard ----------
async function renderClientDashboard(session) {
  app.innerHTML = `<div class="center-screen"><div class="msg">载入中...</div></div>`;

  let { data: profile, error } = await sb
    .from("client_profiles")
    .select("*")
    .eq("email", session.user.email)
    .maybeSingle();

  if (!profile && !error) {
    const fallback = await sb.from("client_profiles").select("*").eq("user_id", session.user.id).maybeSingle();
    profile = fallback.data;
    error = fallback.error;
  }

  if (error || !profile) {
    app.innerHTML = `
      <div class="center-screen">
        <div class="login-box">
          <div class="logo">LEEROY WONG</div>
          <div class="msg" style="margin-top:16px;">
            你的账号还没有关联专属资料。<br/>请联系团队为你的账号设置资料。
          </div>
          <button id="logout-btn" style="margin-top:20px;">登出</button>
        </div>
      </div>
    `;
    document.getElementById("logout-btn").addEventListener("click", async () => {
      await sb.auth.signOut();
      renderLogin();
    });
    return;
  }

  const formula = profile.formula || [];
  const queue = profile.content_queue || [];
  const growth = profile.growth_data || [];
  const currentStage = profile.pipeline_stage || 1;

  const stageHtml = STAGE_NAMES.map((label, i) => {
    const idx = i + 1;
    const status = idx < currentStage ? "done" : idx === currentStage ? "current" : "upcoming";
    return `
      <div class="stage-step">
        <div class="stage-dot ${status}"></div>
        <div class="stage-label ${status === 'upcoming' ? 'upcoming' : ''}">${label}</div>
      </div>
      ${i < STAGE_NAMES.length - 1 ? `<div class="stage-line ${idx < currentStage ? 'active' : ''}"></div>` : ''}
    `;
  }).join("");

  const pillarsHtml = formula.length ? formula.map(p => `
    <div class="pillar">
      <div class="pillar-code">${p.code || ''}</div>
      <div>
        <div><span class="pillar-name">${p.name || ''}</span><span class="pillar-focus">${p.focus || ''}</span></div>
        <div class="pillar-detail">${p.detail || ''}</div>
      </div>
    </div>
  `).join("") : `<div class="empty-state">Leeroy 还在为你准备专属配方，敬请期待。</div>`;

  const queueHtml = queue.length ? queue.map(q => `
    <div class="queue-item">
      <div class="queue-title">${q.title || ''}</div>
      <div style="display:flex;align-items:center;">
        <span class="queue-badge">${q.stage || ''}</span>
        <span class="queue-eta">${q.eta || ''}</span>
      </div>
    </div>
  `).join("") : `<div class="empty-state">目前没有进行中的内容。</div>`;

  let growthHtml = `<div class="empty-state">数据成长记录准备中。</div>`;
  if (growth.length) {
    const latest = growth[growth.length - 1];
    const first = growth[0];
    const followerGrowth = first.followers ? Math.round(((latest.followers - first.followers) / first.followers) * 100) : 0;
    growthHtml = `
      <div class="metric-row">
        <div>
          <div class="metric-label">粉丝数</div>
          <div class="metric-value">${latest.followers?.toLocaleString() || '-'}
            <span style="font-size:13px;color:#7FA86B;margin-left:8px;font-family:'JetBrains Mono',monospace;">
              ${followerGrowth >= 0 ? '+' : ''}${followerGrowth}% (${first.month}起)
            </span>
          </div>
        </div>
        <div>
          <div class="metric-label">本月观看量</div>
          <div class="metric-value">${latest.views?.toLocaleString() || '-'}</div>
        </div>
      </div>
      <table style="width:100%; border-collapse:collapse; margin-top:8px;">
        <thead>
          <tr style="border-bottom:1px solid #2A2619;">
            <th style="text-align:left; padding:8px 0; font-size:12px; color:var(--text-muted); font-weight:400;">月份</th>
            <th style="text-align:right; padding:8px 0; font-size:12px; color:var(--text-muted); font-weight:400;">粉丝数</th>
            <th style="text-align:right; padding:8px 0; font-size:12px; color:var(--text-muted); font-weight:400;">观看量</th>
          </tr>
        </thead>
        <tbody>
          ${growth.map(g => `
            <tr style="border-bottom:1px solid #221F16;">
              <td style="padding:10px 0; font-size:13px; color:var(--text);">${g.month}</td>
              <td style="padding:10px 0; font-size:13px; color:var(--text); text-align:right;">${g.followers?.toLocaleString() || '-'}</td>
              <td style="padding:10px 0; font-size:13px; color:var(--text); text-align:right;">${g.views?.toLocaleString() || '-'}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  app.innerHTML = `
    <div class="app-shell">
      <div class="sidebar">
        <div>
          <div class="logo">LEEROY WONG</div>
          <div class="logo-sub">内容陪跑系统</div>
        </div>
        <div class="nav-logout" id="logout-btn">登出</div>
      </div>
      <div class="main">
        <div class="welcome-sub">${profile.joined_date || ''} 加入 · ${profile.handle || ''}</div>
        <h1 class="page-title">你好，${profile.name}</h1>

        <div class="card formula-card">
          <div class="formula-tag">✦ 专属配方</div>
          <div class="formula-title">${profile.name} 专属内容配方</div>
          <div class="formula-sub">由 Leeroy 亲自制定 · ${profile.industry || ''}</div>
          ${pillarsHtml}
        </div>

        <div class="section-label">当前进度</div>
        <div class="card">
          <div class="stage-row">${stageHtml}</div>
          ${queueHtml}
        </div>

        <div class="section-label">数据成长</div>
        <div class="card">
          ${growthHtml}
        </div>
      </div>
    </div>
  `;

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await sb.auth.signOut();
    renderLogin();
  });
}

// ============================================
// 团队后台管理（Admin）
// ============================================

// ---------- 判断当前登入用户是否为团队管理员 ----------
async function isTeamAdmin(userId) {
  const { data } = await sb.from("admin_users").select("user_id").eq("user_id", userId).maybeSingle();
  return !!data;
}

function adminShellHtml(mainHtml) {
  return `
    <div class="app-shell">
      <div class="sidebar">
        <div>
          <div class="logo">LEEROY WONG</div>
          <div class="logo-sub">团队管理后台</div>
        </div>
        <div class="nav-logout" id="logout-btn">登出</div>
      </div>
      <div class="main">${mainHtml}</div>
    </div>
  `;
}

function bindAdminShellEvents() {
  document.getElementById("logout-btn").addEventListener("click", async () => {
    await sb.auth.signOut();
    renderLogin();
  });
}

// ---------- 动态行模板：专属配方 / 内容队列 / 数据成长 ----------
function pillarRowHtml(p = {}) {
  return `
    <div class="dyn-row" style="flex-direction:column; align-items:stretch;">
      <div style="display:flex; gap:10px;">
        <input type="text" class="p-code pillar-code-input" placeholder="01" value="${p.code || ''}" />
        <input type="text" class="p-name" placeholder="支柱名称" value="${p.name || ''}" />
        <input type="text" class="p-focus" placeholder="定位 / 侧重" value="${p.focus || ''}" />
        <button type="button" class="remove-row-btn" title="删除">×</button>
      </div>
      <textarea class="p-detail" placeholder="详细说明">${p.detail || ''}</textarea>
    </div>
  `;
}

function queueRowHtml(q = {}) {
  return `
    <div class="dyn-row">
      <input type="text" class="q-title" placeholder="内容标题" value="${q.title || ''}" />
      <input type="text" class="q-stage" placeholder="阶段（如 Editor 剪辑）" value="${q.stage || ''}" />
      <input type="text" class="q-eta" placeholder="预计时间（如 3天后）" value="${q.eta || ''}" />
      <button type="button" class="remove-row-btn" title="删除">×</button>
    </div>
  `;
}

function growthRowHtml(g = {}) {
  return `
    <div class="dyn-row">
      <input type="text" class="g-month" placeholder="月份（如 2026-06）" value="${g.month || ''}" />
      <input type="number" class="g-followers" placeholder="粉丝数" value="${g.followers ?? ''}" />
      <input type="number" class="g-views" placeholder="观看量" value="${g.views ?? ''}" />
      <button type="button" class="remove-row-btn" title="删除">×</button>
    </div>
  `;
}

// ---------- 渲染：客户列表 ----------
async function renderAdminList() {
  app.innerHTML = adminShellHtml(`<div class="msg">载入中...</div>`);
  bindAdminShellEvents();

  const { data: clients, error } = await sb.from("client_profiles").select("*").order("name", { ascending: true });

  if (error) {
    document.querySelector(".main").innerHTML = `<div class="msg error">载入客户列表失败：${error.message}</div>`;
    return;
  }

  renderClientListView(clients || []);
}

function renderClientListView(allClients) {
  const listHtml = (list) => list.length ? list.map((c, i) => `
    <div class="client-row" data-idx="${i}">
      <div>
        <div class="client-name">${c.name || '(未命名)'}</div>
        <div class="client-meta">${c.email || '未设置邮箱'}${c.handle ? ' · ' + c.handle : ''}</div>
      </div>
      <div class="stage-chip">${STAGE_NAMES[(c.pipeline_stage || 1) - 1] || ''}</div>
    </div>
  `).join("") : `<div class="empty-state">还没有老板资料，点击右上角新增。</div>`;

  document.querySelector(".main").innerHTML = `
    <h1 class="page-title">客户列表</h1>
    <div class="welcome-sub">共 ${allClients.length} 位老板</div>
    <div class="admin-topbar">
      <input type="text" class="search-input" id="client-search" placeholder="搜索姓名 / 邮箱 / handle" />
      <button class="btn-sm" id="new-client-btn" style="width:auto;">+ 新增老板</button>
    </div>
    <div class="card" id="client-list" style="padding:8px 32px;">
      ${listHtml(allClients)}
    </div>
  `;

  let currentList = allClients;

  function bindRows() {
    document.querySelectorAll(".client-row").forEach(row => {
      row.addEventListener("click", () => {
        renderAdminEditor(currentList[Number(row.dataset.idx)], allClients);
      });
    });
  }
  bindRows();

  document.getElementById("new-client-btn").addEventListener("click", () => renderAdminEditor(null, allClients));

  document.getElementById("client-search").addEventListener("input", (e) => {
    const q = e.target.value.trim().toLowerCase();
    currentList = allClients.filter(c =>
      (c.name || '').toLowerCase().includes(q) ||
      (c.email || '').toLowerCase().includes(q) ||
      (c.handle || '').toLowerCase().includes(q)
    );
    document.getElementById("client-list").innerHTML = listHtml(currentList);
    bindRows();
  });
}

// ---------- 渲染：编辑 / 新增老板 ----------
function renderAdminEditor(client, allClients) {
  const isNew = !client;
  const c = client || {};
  const formula = c.formula || [];
  const queue = c.content_queue || [];
  const growth = c.growth_data || [];
  const stage = c.pipeline_stage || 1;
  const originalEmail = c.email || null;

  const stagePickerHtml = STAGE_NAMES.map((label, i) => {
    const idx = i + 1;
    return `<div class="stage-option ${idx === stage ? 'selected' : ''}" data-stage="${idx}">${idx}. ${label}</div>`;
  }).join("");

  document.querySelector(".main").innerHTML = `
    <a href="#" class="btn-ghost editor-back" id="back-to-list">← 返回客户列表</a>
    <h1 class="page-title">${isNew ? '新增老板' : (c.name || '编辑老板')}</h1>
    <div class="welcome-sub">${isNew ? '填写基本资料后点击保存即可创建' : '修改后点击保存生效，老板端会实时看到更新'}</div>

    <div class="section-label">基本资料</div>
    <div class="card">
      <div class="form-grid">
        <div class="form-group"><label class="field-label">姓名</label><input type="text" id="f-name" value="${c.name || ''}" /></div>
        <div class="form-group"><label class="field-label">邮箱（用于关联老板登入账号）</label><input type="text" id="f-email" value="${c.email || ''}" placeholder="boss@example.com" /></div>
        <div class="form-group"><label class="field-label">Handle / 平台账号</label><input type="text" id="f-handle" value="${c.handle || ''}" /></div>
        <div class="form-group"><label class="field-label">行业</label><input type="text" id="f-industry" value="${c.industry || ''}" /></div>
        <div class="form-group"><label class="field-label">加入日期</label><input type="date" id="f-joined" value="${c.joined_date || ''}" /></div>
      </div>
    </div>

    <div class="section-label">进度阶段</div>
    <div class="card">
      <div class="stage-picker" id="stage-picker">${stagePickerHtml}</div>
    </div>

    <div class="section-label">专属配方（内容支柱）</div>
    <div class="card">
      <div id="pillars-container">${formula.length ? formula.map(pillarRowHtml).join("") : ''}</div>
      <button type="button" class="add-row-btn" id="add-pillar-btn">+ 添加支柱</button>
    </div>

    <div class="section-label">内容队列</div>
    <div class="card">
      <div id="queue-container">${queue.length ? queue.map(queueRowHtml).join("") : ''}</div>
      <button type="button" class="add-row-btn" id="add-queue-btn">+ 添加内容</button>
    </div>

    <div class="section-label">数据成长</div>
    <div class="card">
      <div id="growth-container">${growth.length ? growth.map(growthRowHtml).join("") : ''}</div>
      <button type="button" class="add-row-btn" id="add-growth-btn">+ 添加一个月数据</button>
    </div>

    <div class="btn-row">
      <button class="btn-sm" id="save-client-btn" style="width:auto;">保存</button>
      <button class="btn-sm btn-secondary" id="cancel-edit-btn">取消</button>
      ${!isNew ? `<button class="btn-sm btn-danger" id="delete-client-btn">删除该老板</button>` : ''}
    </div>
  `;

  document.getElementById("back-to-list").addEventListener("click", (e) => { e.preventDefault(); renderClientListView(allClients); });
  document.getElementById("cancel-edit-btn").addEventListener("click", () => renderClientListView(allClients));

  document.getElementById("stage-picker").addEventListener("click", (e) => {
    const opt = e.target.closest(".stage-option");
    if (!opt) return;
    document.querySelectorAll(".stage-option").forEach(o => o.classList.remove("selected"));
    opt.classList.add("selected");
  });

  document.getElementById("add-pillar-btn").addEventListener("click", () => {
    document.getElementById("pillars-container").insertAdjacentHTML("beforeend", pillarRowHtml());
  });
  document.getElementById("add-queue-btn").addEventListener("click", () => {
    document.getElementById("queue-container").insertAdjacentHTML("beforeend", queueRowHtml());
  });
  document.getElementById("add-growth-btn").addEventListener("click", () => {
    document.getElementById("growth-container").insertAdjacentHTML("beforeend", growthRowHtml());
  });

  ["pillars-container", "queue-container", "growth-container"].forEach(id => {
    document.getElementById(id).addEventListener("click", (e) => {
      if (e.target.matches(".remove-row-btn")) {
        e.target.closest(".dyn-row").remove();
      }
    });
  });

  if (!isNew) {
    document.getElementById("delete-client-btn").addEventListener("click", async () => {
      if (!confirm(`确定要删除「${c.name || c.email}」的资料吗？此操作无法撤销。`)) return;
      const { error } = await sb.from("client_profiles").delete().eq("email", originalEmail);
      if (error) { toast("删除失败：" + error.message, true); return; }
      toast("已删除");
      renderAdminList();
    });
  }

  document.getElementById("save-client-btn").addEventListener("click", async () => {
    const newEmail = document.getElementById("f-email").value.trim();
    const newName = document.getElementById("f-name").value.trim();
    if (!newEmail) { toast("请填写邮箱，用于关联该老板的登入账号", true); return; }
    if (!newName) { toast("请填写姓名", true); return; }

    const payload = {
      name: newName,
      email: newEmail,
      handle: document.getElementById("f-handle").value.trim(),
      industry: document.getElementById("f-industry").value.trim(),
      joined_date: document.getElementById("f-joined").value || null,
      pipeline_stage: Number(document.querySelector(".stage-option.selected")?.dataset.stage || 1),
      formula: Array.from(document.querySelectorAll("#pillars-container .dyn-row")).map(row => ({
        code: row.querySelector(".p-code").value.trim(),
        name: row.querySelector(".p-name").value.trim(),
        focus: row.querySelector(".p-focus").value.trim(),
        detail: row.querySelector(".p-detail").value.trim(),
      })),
      content_queue: Array.from(document.querySelectorAll("#queue-container .dyn-row")).map(row => ({
        title: row.querySelector(".q-title").value.trim(),
        stage: row.querySelector(".q-stage").value.trim(),
        eta: row.querySelector(".q-eta").value.trim(),
      })),
      growth_data: Array.from(document.querySelectorAll("#growth-container .dyn-row")).map(row => ({
        month: row.querySelector(".g-month").value.trim(),
        followers: row.querySelector(".g-followers").value ? Number(row.querySelector(".g-followers").value) : null,
        views: row.querySelector(".g-views").value ? Number(row.querySelector(".g-views").value) : null,
      })),
    };

    const btn = document.getElementById("save-client-btn");
    btn.disabled = true;
    btn.textContent = "保存中...";

    let error;
    if (isNew) {
      ({ error } = await sb.from("client_profiles").insert(payload));
    } else {
      ({ error } = await sb.from("client_profiles").update(payload).eq("email", originalEmail));
    }

    btn.disabled = false;
    btn.textContent = "保存";

    if (error) {
      toast("保存失败：" + error.message, true);
      return;
    }
    toast("保存成功");
    renderAdminList();
  });
}

// ---------- 登入后路由：团队管理员 vs 老板 ----------
async function route(session) {
  const admin = await isTeamAdmin(session.user.id);
  if (admin) {
    renderAdminList();
  } else {
    renderClientDashboard(session);
  }
}

// ---------- 处理登入连结点击后，Supabase 重定向带回来的错误信息 ----------
// 常见情况：magic link 是一次性的，如果邮箱客户端（比如 Outlook 安全链接扫描）
// 在用户真正点击前就先访问过一次，链接会被提前消耗，导致点击后直接失效。
function getAuthErrorFromUrl() {
  const hash = window.location.hash.startsWith('#') ? window.location.hash.slice(1) : '';
  const params = new URLSearchParams(hash);
  const error = params.get('error');
  const errorDescription = params.get('error_description');
  if (!error && !errorDescription) return null;

  // 清掉网址里的错误参数，避免刷新页面时反复弹出同一个错误
  history.replaceState(null, '', window.location.pathname + window.location.search);

  return errorDescription ? decodeURIComponent(errorDescription.replace(/\+/g, ' ')) : error;
}

// ---------- 启动：检查登入状态 ----------
async function init() {
  const authError = getAuthErrorFromUrl();
  if (authError) {
    renderLogin("登入连结无效或已过期：" + authError + "。请重新发送登入连结（收到后尽快点击，且只点一次）。", true);
    return;
  }

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    route(session);
  } else {
    renderLogin();
  }
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN" && session) {
    route(session);
  } else if (event === "SIGNED_OUT") {
    renderLogin();
  }
});

init();
</script>
